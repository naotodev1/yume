<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Yume — a assistente da YumeRoll Animes</title>
<style>
  /* --- Estilo Base e Variáveis --- */
  :root {
    --bg-color: #f9fafb; --surface-color: #ffffff; --primary-color: #6d28d9;
    --primary-gradient: linear-gradient(90deg, var(--primary-color), #4f46e5);
    --text-color: #1f2937; --text-muted: #6b7280; --border-color: #e5e7eb;
    --danger-color: #ef4444; --success-color: #10b981; --warning-color: #f59e0b;
    --font-family: "Inter", system-ui, sans-serif;
    --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05); --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: var(--font-family); background-color: var(--bg-color); color: var(--text-color); line-height: 1.6; }

  /* --- Layout Principal --- */
  .app-layout { display: grid; grid-template-columns: 260px 1fr; height: 100vh; }
  .sidebar { background-color: var(--surface-color); border-right: 1px solid var(--border-color); padding: 16px; display: flex; flex-direction: column; }
  .chat-area { display: flex; flex-direction: column; height: 100vh; background-color: var(--bg-color); }

  /* --- Componentes da Sidebar --- */
  .sidebar-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; padding: 8px; }
  .sidebar-logo svg { flex-shrink: 0; }
  .sidebar-logo span { font-size: 20px; font-weight: 600; }
  .sidebar-btn { display: flex; align-items: center; gap: 10px; width: 100%; padding: 10px 12px; border: none; border-radius: 8px; background-color: transparent; cursor: pointer; font-size: 14px; text-align: left; margin-bottom: 6px; transition: all 0.2s ease; }
  .sidebar-btn:hover { background-color: #f3f4f6; }
  .sidebar-btn.active { background-color: #f3f4f6; font-weight: 500; }
  .sidebar-menu { flex: 1; border-top: 1px solid var(--border-color); padding-top: 8px; }

  /* --- Área de Chat --- */
  .chat-content { flex: 1; overflow-y: auto; padding: 24px; max-width: 800px; width: 100%; margin: 0 auto; }
  .messages { display: flex; flex-direction: column; gap: 18px; }
  .chat-input-area { padding: 16px 24px; max-width: 824px; width: 100%; margin: 0 auto; }
  .chat-input-wrapper { position: relative; background-color: var(--surface-color); border: 1px solid var(--border-color); border-radius: 12px; padding: 8px 48px 8px 12px; box-shadow: var(--shadow-sm); transition: box-shadow 0.2s ease; }
  .chat-input-wrapper:focus-within { box-shadow: var(--shadow-md); border-color: var(--primary-color); }
  .chat-input-wrapper textarea { width: 100%; border: none; outline: none; resize: none; font-size: 16px; padding: 8px; max-height: 200px; background: transparent; }
  .send-btn { position: absolute; right: 12px; bottom: 12px; width: 32px; height: 32px; border-radius: 8px; border: none; background-color: var(--primary-color); color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background-color 0.2s ease; }
  .send-btn:hover { background-color: #5b21b6; }
  .send-btn:disabled { background-color: #9ca3af; cursor: not-allowed; }
  .chat-footer { text-align: center; font-size: 12px; color: var(--text-muted); padding: 10px 0; }
  
  /* --- Mensagens de Chat --- */
  .msg { display: flex; gap: 12px; align-items: flex-start; } 
  .msg-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 500; font-size: 14px; flex-shrink: 0; } 
  .msg-content { flex: 1; padding-top: 4px; } 
  .msg.yume .msg-avatar { background-color: #f3e8ff; color: var(--primary-color); } 
  .msg.user { flex-direction: row-reverse; } 
  .msg.user .msg-avatar { background-color: #e0e7ff; color: #4338ca; } 
  .typing-indicator { font-style: italic; color: var(--text-muted); }
  .msg-time { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

  /* --- Estado Vazio do Chat --- */
  #emptyState { text-align: center; margin: auto; max-width: 500px; }
  .suggestion-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 24px; }
  .suggestion-chip { padding: 8px 14px; background-color: var(--surface-color); border: 1px solid var(--border-color); border-radius: 99px; cursor: pointer; font-size: 14px; transition: all 0.2s ease; }
  .suggestion-chip:hover { background-color: #f3f4f6; border-color: #d1d5db; }

  /* --- Overlay de Autenticação e Modais --- */
  .overlay { position: fixed; inset: 0; z-index: 100; background-color: rgba(249, 250, 251, 0.9); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; padding: 16px; }
  .card { background: var(--surface-color); padding: 24px 28px; border-radius: 12px; box-shadow: var(--shadow-lg); width: 100%; }
  .auth-card { max-width: 420px; } 
  .modal-card { max-width: 560px; }
  .card h2 { margin-top: 0; } 
  .card .form-group { margin-bottom: 16px; } 
  .card label { font-size: 14px; font-weight: 500; display: block; margin-bottom: 4px; } 
  .card input, .card select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border-color); font-size: 16px; transition: border-color 0.2s ease; }
  .card input:focus, .card select:focus { border-color: var(--primary-color); outline: none; }
  .card-actions { display: flex; gap: 12px; margin-top: 24px; justify-content: flex-end; }
  .btn { border: none; padding: 10px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.2s ease; } 
  .btn.primary { background: var(--primary-color); color: white; } 
  .btn.primary:hover { background: #5b21b6; }
  .btn.secondary { background: var(--border-color); color: var(--text-color); } 
  .btn.secondary:hover { background: #d1d5db; }
  .btn.danger { background: var(--danger-color); color: white; } 
  .btn.danger:hover { background: #dc2626; }
  .btn.success { background: var(--success-color); color: white; }
  .btn.success:hover { background: #059669; }
  .tos-label { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-muted); } 
  .tos-label a { color: var(--primary-color); text-decoration: none; } 
  .tos-label a:hover { text-decoration: underline; }
  .auth-footer { font-size: 12px; color: var(--text-muted); text-align: center; margin-top: 16px; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; border-bottom: 1px solid var(--border-color); padding-bottom: 12px; }
  .modal-header h2 { margin: 0; } 
  .close-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text-muted); }
  .prefs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
  .prefs-grid label { display: flex; align-items: center; gap: 6px; padding: 8px; border-radius: 6px; border: 1px solid var(--border-color); font-size: 14px; cursor: pointer; transition: all 0.2s ease; }
  .prefs-grid label:hover { background-color: #f3f4f6; }
  .prefs-grid input:checked + span { font-weight: 500; }

  /* --- Tabelas e dados admin --- */
  .data-table { width: 100%; border-collapse: collapse; margin-top: 16px; }
  .data-table th, .data-table td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border-color); }
  .data-table th { background-color: #f9fafb; font-weight: 500; }
  .data-table tr:hover { background-color: #f9fafb; }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .stat-card { background: var(--surface-color); padding: 16px; border-radius: 8px; box-shadow: var(--shadow-sm); }
  .stat-value { font-size: 24px; font-weight: 600; margin-bottom: 4px; }
  .stat-label { font-size: 14px; color: var(--text-muted); }

  /* --- Controles de voz --- */
  .voice-controls { display: flex; gap: 8px; margin-top: 12px; }
  .voice-btn { padding: 8px 12px; border: 1px solid var(--border-color); background: var(--surface-color); border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 6px; font-size: 14px; transition: all 0.2s ease; }
  .voice-btn:hover { background: #f3f4f6; }
  .voice-btn.listening { background: var(--primary-color); color: white; border-color: var(--primary-color); }
  .voice-btn.speaking { background: var(--success-color); color: white; border-color: var(--success-color); }

  /* --- Notificações --- */
  .notification-container { position: fixed; top: 20px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
  .notification { background: var(--surface-color); padding: 12px 16px; border-radius: 8px; box-shadow: var(--shadow-lg); border-left: 4px solid var(--primary-color); display: flex; justify-content: between; align-items: center; gap: 12px; max-width: 320px; }
  .notification.success { border-left-color: var(--success-color); }
  .notification.warning { border-left-color: var(--warning-color); }
  .notification.error { border-left-color: var(--danger-color); }
  .notification-content { flex: 1; }
  .notification-close { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--text-muted); }

  /* --- Lembretes --- */
  .reminder-item { padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
  .reminder-actions { display: flex; gap: 8px; }

  /* --- Indicadores de carregamento --- */
  .loading { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s ease-in-out infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* --- Responsividade --- */
  @media (max-width: 768px) {
    .app-layout { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .chat-content { padding: 16px; }
    .chat-input-area { padding: 16px; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .notification-container { left: 16px; right: 16px; top: 16px; }
  }
</style>
</head>

<script>
// =================================================================================
// --- Módulo de Criptografia e Armazenamento (Crypto & Storage) ---
// =================================================================================
const Crypto = (() => {
    const encoder = new TextEncoder();
    const decoder = new TextDecoder();
    const bufToBase64 = buf => btoa(String.fromCharCode(...new Uint8Array(buf)));
    const base64ToBuf = b64 => Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    
    const deriveKey = async (pass, salt) => {
        const keyMaterial = await crypto.subtle.importKey(
            'raw', 
            encoder.encode(pass), 
            'PBKDF2', 
            false, 
            ['deriveKey']
        );
        
        return crypto.subtle.deriveKey(
            {
                name: 'PBKDF2',
                salt: encoder.encode(salt),
                iterations: 100000,
                hash: 'SHA-256'
            },
            keyMaterial,
            { name: 'AES-GCM', length: 256 },
            true,
            ['encrypt', 'decrypt']
        );
    };
    
    const encrypt = async (text, key) => {
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const ct = await crypto.subtle.encrypt(
            { name: 'AES-GCM', iv },
            key,
            encoder.encode(text)
        );
        return {
            ciphertext: bufToBase64(ct),
            iv: bufToBase64(iv)
        };
    };
    
    const decrypt = async (ctB64, ivB64, key) => {
        const ct = base64ToBuf(ctB64);
        const iv = base64ToBuf(ivB64);
        const pt = await crypto.subtle.decrypt(
            { name: 'AES-GCM', iv },
            key,
            ct
        );
        return decoder.decode(pt);
    };
    
    const generateHash = async (text) => {
        const data = encoder.encode(text);
        const hashBuffer = await crypto.subtle.digest('SHA-256', data);
        return bufToBase64(hashBuffer);
    };
    
    return { deriveKey, encrypt, decrypt, generateHash };
})();

// =================================================================================
// --- Módulo de Armazenamento (Storage) ---
// =================================================================================
const Storage = (() => {
    const USERS_KEY = 'yume_users_v5';
    const METRICS_KEY = 'yume_metrics_v3';
    const SESSION_KEY = 'yume_session_v3';
    const REMINDERS_KEY = 'yume_reminders_v1';
    const NEWS_CACHE_KEY = 'yume_news_cache_v1';
    
    const getUsers = () => JSON.parse(localStorage.getItem(USERS_KEY) || '{}');
    const saveUsers = users => localStorage.setItem(USERS_KEY, JSON.stringify(users));
    
    const getMetrics = () => JSON.parse(localStorage.getItem(METRICS_KEY) || '[]');
    const saveMetrics = metrics => localStorage.setItem(METRICS_KEY, JSON.stringify(metrics));
    
    const getSession = () => JSON.parse(localStorage.getItem(SESSION_KEY) || '{}');
    const saveSession = session => localStorage.setItem(SESSION_KEY, JSON.stringify(session));
    const clearSession = () => localStorage.removeItem(SESSION_KEY);
    
    const getReminders = () => JSON.parse(localStorage.getItem(REMINDERS_KEY) || '[]');
    const saveReminders = reminders => localStorage.setItem(REMINDERS_KEY, JSON.stringify(reminders));
    
    const getNewsCache = () => JSON.parse(localStorage.getItem(NEWS_CACHE_KEY) || '{}');
    const saveNewsCache = cache => localStorage.setItem(NEWS_CACHE_KEY, JSON.stringify(cache));
    
    return {
        // Usuários
        getAllUsers: getUsers,
        getUser: id => getUsers()[id],
        saveUser: (id, record) => { 
            const users = getUsers(); 
            users[id] = record; 
            saveUsers(users); 
        },
        findUserByHmac: hmac => { 
            const u = getUsers(); 
            return Object.entries(u).find(([_,v]) => v.email_hmac === hmac); 
        },
        deleteUser: id => { 
            const users = getUsers(); 
            delete users[id]; 
            saveUsers(users); 
        },
        
        // Métricas
        getMetrics,
        saveMetrics,
        addMetric: (metric) => {
            const metrics = getMetrics();
            metrics.push({
                ...metric,
                timestamp: new Date().toISOString()
            });
            saveMetrics(metrics);
        },
        
        // Sessão
        getSession,
        saveSession,
        clearSession,
        
        // Lembretes
        getReminders,
        saveReminders,
        addReminder: (reminder) => {
            const reminders = getReminders();
            reminders.push({
                id: `rem_${Date.now()}`,
                ...reminder,
                userId: session.userId,
                createdAt: new Date().toISOString(),
                completed: false
            });
            saveReminders(reminders);
            return reminders[reminders.length - 1];
        },
        updateReminder: (id, updates) => {
            const reminders = getReminders();
            const index = reminders.findIndex(r => r.id === id);
            if (index !== -1) {
                reminders[index] = { ...reminders[index], ...updates };
                saveReminders(reminders);
                return reminders[index];
            }
            return null;
        },
        deleteReminder: (id) => {
            const reminders = getReminders();
            const filtered = reminders.filter(r => r.id !== id);
            saveReminders(filtered);
            return filtered;
        },
        getUserReminders: () => {
            return getReminders().filter(r => r.userId === session.userId);
        },
        
        // Cache de Notícias
        getNewsCache,
        saveNewsCache
    };
})();

// =================================================================================
// --- Módulo de Notificações ---
// =================================================================================
const Notifications = (() => {
    const show = (message, type = 'info', duration = 5000) => {
        const container = document.getElementById('notificationContainer');
        const notification = document.createElement('div');
        notification.className = `notification ${type}`;
        notification.innerHTML = `
            <div class="notification-content">${message}</div>
            <button class="notification-close">&times;</button>
        `;
        
        container.appendChild(notification);
        
        // Auto-remover após duração
        const autoRemove = setTimeout(() => {
            if (notification.parentNode) {
                notification.parentNode.removeChild(notification);
            }
        }, duration);
        
        // Remover ao clicar no botão de fechar
        notification.querySelector('.notification-close').addEventListener('click', () => {
            clearTimeout(autoRemove);
            if (notification.parentNode) {
                notification.parentNode.removeChild(notification);
            }
        });
        
        return notification;
    };
    
    const requestPermission = async () => {
        if ('Notification' in window) {
            const permission = await Notification.requestPermission();
            return permission === 'granted';
        }
        return false;
    };
    
    const showBrowserNotification = (title, options = {}) => {
        if ('Notification' in window && Notification.permission === 'granted') {
            new Notification(title, {
                icon: '/favicon.ico',
                badge: '/favicon.ico',
                ...options
            });
        }
    };
    
    return { show, requestPermission, showBrowserNotification };
})();

// --- Módulo de Voz (STT e TTS) ---
// =================================================================================
const Voice = (() => {
    let recognition = null;
    let synthesis = null;
    
    const initSTT = () => {
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'pt-BR';
            
            return true;
        }
        return false;
    };
    
    const initTTS = () => {
        if ('speechSynthesis' in window) {
            synthesis = window.speechSynthesis;
            return true;
        }
        return false;
    };
    
    const startListening = (onResult, onError) => {
        if (!recognition) {
            if (!initSTT()) {
                onError('Reconhecimento de voz não suportado neste navegador');
                return false;
            }
        }
        
        try {
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                onResult(transcript);
            };
            
            recognition.onerror = (event) => {
                onError(event.error);
            };
            
            recognition.start();
            return true;
        } catch (error) {
            onError(error.message);
            return false;
        }
    };
    
    const stopListening = () => {
        if (recognition) {
            recognition.stop();
        }
    };
    
    const speak = (text, onEnd = null) => {
        if (!synthesis) {
            if (!initTTS()) {
                Notifications.show('Síntese de voz não suportada', 'error');
                return false;
            }
        }
        
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'pt-BR';
        utterance.rate = 1.0;
        utterance.pitch = 1.0;
        
        if (onEnd) {
            utterance.onend = onEnd;
        }
        
        synthesis.speak(utterance);
        return true;
    };
    
    const stopSpeaking = () => {
        if (synthesis) {
            synthesis.cancel();
        }
    };
    
    return {
        initSTT,
        initTTS,
        startListening,
        stopListening,
        speak,
        stopSpeaking
    };
})();

const NLP = (() => {
    const classifyIntent = (text) => {
        const t = text.toLowerCase().trim();
        
        // Padrões mais específicos para melhor reconhecimento
        const patterns = {
            greet: /\b(olá|oi|ola|e aí|eai|bom dia|boa tarde|boa noite|hey|hello|saudações)\b/i,
            recommend: /\b(recomend|sugest|indica|qual.*(ver|assistir|ler)|o que.*(ver|assistir)|me.*(recomenda|indica)|preciso.*(sugest|recomend)|quero.*(assistir|ver|ler)|buscar|encontrar|achar|procurar)\b/i,
            thanks: /\b(obrigad|valeu|obg|agradeço|grato|thank you|thanks)\b/i,
            help: /\b(ajuda|help|como funciona|o que você faz|o que pode fazer|funcionalidades|comandos)\b/i,
            news: /\b(novidad|lançamento|estreia|notícia|news|atualização|recente|novo)\b/i,
            search: /\b(pesquisar|buscar|encontrar|procurar|quero.*sobre|informação.*sobre)\b/i,
            reminder: /\b(lembrete|lembrar|alerta|notificar|avisar|marcar|agendar|lembra.*(de|para)|não.*esquecer)\b/i,

            weather: /\b(clima|tempo|previsão|chuva|sol|temperatura)\b/i,
            goodbye: /\b(tchau|adeus|até mais|flw|fui|sair|bye)\b/i
        };
        
        for (const [intent, pattern] of Object.entries(patterns)) {
            if (pattern.test(t)) return intent;
        }
        
        return 'chitchat';
    };
    
    const extractEntities = (text) => {
        const entities = {
            genres: [],

const Reminders = (() => {
    let reminderCheckInterval = null;
    
    const createReminder = (text, dateTime) => {
        const reminder = Storage.addReminder({
            text,
            dueDate: dateTime,
            notified: false
        });
        
        Notifications.show(`Lembrete criado: "${text}"`, 'success');
        checkReminders();
        return reminder;
    };
    
    const checkReminders = () => {
        const now = new Date();
        const userReminders = Storage.getUserReminders();
        
        userReminders.forEach(reminder => {
            if (!reminder.completed && !reminder.notified && new Date(reminder.dueDate) <= now) {
                // Mostrar notificação
                Notifications.show(`🔔 Lembrete: ${reminder.text}`, 'warning', 10000);
                Notifications.showBrowserNotification('Lembrete da Yume', {
                    body: reminder.text,
                    icon: '/favicon.ico'
                });
                
                // Marcar como notificado
                Storage.updateReminder(reminder.id, { notified: true });
            }
        });
    };
    
    const startReminderService = () => {
        if (reminderCheckInterval) {
            clearInterval(reminderCheckInterval);
        }
        
        reminderCheckInterval = setInterval(checkReminders, 60000); // Verificar a cada minuto
        checkReminders(); // Verificar imediatamente ao iniciar
    };
    
    const stopReminderService = () => {
        if (reminderCheckInterval) {
            clearInterval(reminderCheckInterval);
            reminderCheckInterval = null;
        }
    };
    
    const parseReminderText = (text) => {
        // Implementação simples de parsing de datas
        const patterns = [
            { regex: /amanhã|amanha/i, date: () => {
                const tomorrow = new Date();
                tomorrow.setDate(tomorrow.getDate() + 1);
                return tomorrow;
            }},
            { regex: /hoje/i, date: () => new Date() },
            { regex: /(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/, date: (match) => {
                return new Date(match[3], match[2] - 1, match[1]);
            }},
            { regex: /(\d{1,2})[\/\-](\d{1,2})/, date: (match) => {
                const now = new Date();
                return new Date(now.getFullYear(), match[2] - 1, match[1]);
            }}
        ];
        
        let dueDate = new Date();
        dueDate.setHours(dueDate.getHours() + 1); // Padrão: 1 hora a partir de agora
        
        for (const pattern of patterns) {
            const match = text.match(pattern.regex);
            if (match) {
                dueDate = pattern.date(match);
                break;
            }
        }
        
        // Extrair hora se mencionada
        const timeMatch = text.match(/(\d{1,2})[h:](\d{2})?/);
        if (timeMatch) {
            dueDate.setHours(parseInt(timeMatch[1]), timeMatch[2] ? parseInt(timeMatch[2]) : 0, 0, 0);
        }
        
        return dueDate;
    };
    
    return {
        createReminder,
        checkReminders,
        startReminderService,
        stopReminderService,
        parseReminderText
    };
})();

            UI.setSendButtonState(false);
            
            const intent = NLP.classifyIntent(text);
            const entities = NLP.extractEntities(text);
            const response = NLP.generateResponse(intent, entities, text, session.prefs);
            
            UI.appendMessage('yume', response);
            
            // Verificar se é um lembrete
            if (intent === 'reminder') {
                const dueDate = Reminders.parseReminderText(text);
                Reminders.createReminder(text, dueDate);
            }
        }, 1000 + Math.random() * 1000);
    };

    const handleAuth = async () => {
        const email = document.getElementById('inputEmail').value.trim().toLowerCase();
        const password = document.getElementById('inputPassword').value;
        const name = document.getElementById('inputName').value.trim();
        
        // Validações melhoradas
        if(!email || !password) {
            Notifications.show('E-mail e senha são necessários', 'error');
            return;
        }
        
        // Validação de e-mail básica
        if (!email.includes('@') || !email.includes('.')) {
            Notifications.show('Por favor, insira um e-mail válido', 'error');
            return;
        }
        
        if (UI.isRegister()) {
            if(!name) {
                Notifications.show('O nome é necessário para o cadastro', 'error');
                return;
            }
            
            if(!document.getElementById('chkTOS').checked) {
                Notifications.show('Você precisa aceitar os Termos de Uso', 'error');
                return;
            }
        }

        try {
            const masterKey = await Crypto.deriveKey(password, email);
            const emailHmac = await Crypto.generateHash(email);

            if (UI.isRegister()) {
                if (Storage.findUserByHmac(emailHmac)) {
                    Notifications.show('Este e-mail já está cadastrado', 'error');
                    return;
                }

                const userId = `u_${Date.now()}`;
                const payload = { 
                    name, 
                    email, 
                    prefs: { genres: ['Ação', 'Comédia'], format: 'anime' },
                    createdAt: new Date().toISOString()
                };
                
                const encryptedPayload = await Crypto.encrypt(JSON.stringify(payload), masterKey);
                Storage.saveUser(userId, { 
                    user_uuid: userId, 
                    email_hmac: emailHmac, 
                    payload: encryptedPayload,
                    registeredAt: new Date().toISOString()
                });
                
                Object.assign(session, { userId, name, email, masterKey, prefs: payload.prefs, chatHistory: [] });
                
                Notifications.show(`Bem-vindo(a), ${name}! Cadastro realizado com sucesso!`, 'success');
            } else {
                const found = Storage.findUserByHmac(emailHmac);
                if (!found) {
                    Notifications.show('E-mail ou senha incorretos', 'error');
                    return;
                }
                
                const [userId, record] = found;
                try {
                    const decryptedPayload = await Crypto.decrypt(record.payload.ciphertext, record.payload.iv, masterKey);
                    const payload = JSON.parse(decryptedPayload);
                    Object.assign(session, { userId, masterKey, ...payload, chatHistory: [] });
                    
                    Notifications.show(`Bem-vindo de volta, ${payload.name}!`, 'success');
                } catch (e) { 
                    Notifications.show('E-mail ou senha incorretos', 'error');
                    return; 
                }
            }
            
            Storage.saveSession(session);
            UI.renderApp();
        } catch (error) {
            console.error('Erro durante autenticação:', error);
            Notifications.show('Ocorreu um erro durante a autenticação. Tente novamente.', 'error');
        }
    };

    const handleLogout = () => {
        Reminders.stopReminderService();
        session = { userId: null, name: null, email: null, masterKey: null, prefs: { genres: [], format: 'anime' }, chatHistory: [] };
        sessionStorage.removeItem('tutorialShown');
        Storage.clearSession();
        UI.clearChat(); 
        UI.renderApp();
        Notifications.show('Você saiu da sua conta. Até logo!', 'info');
    };
    
    const showProfile = () => {
        const genresHTML = ALL_GENRES.map(g => `
            <label>
                <input type="checkbox" name="genre" value="${g}" ${session.prefs.genres.includes(g) ? 'checked' : ''}>
                <span>${g}</span>
            </label>
        `).join('');
        
        const formatsHTML = Object.entries(ALL_FORMATS).map(([val, label]) => 
            `<option value="${val}" ${session.prefs.format === val ? 'selected' : ''}>${label}</option>`
        ).join('');
        
        UI.openModal('👤 Perfil & Preferências', `
            <div class="form-group">
                <label>Nome</label>
                <input id="profileName" value="${session.name}">
            </div>
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" value="${session.email}" disabled style="background-color: #f3f4f6;">
                <small style="color: var(--text-muted);">E-mail não pode ser alterado</small>
            </div>
            <div class="form-group">
                <label>Formato Preferido</label>
                <select id="profileFormat">${formatsHTML}</select>
            </div>
            <div class="form-group">
                <label>Gêneros Favoritos</label>
                <div class="prefs-grid">${genresHTML}</div>
            </div>
            <div class="card-actions" style="justify-content:space-between;">
                <button class="btn danger" id="deleteAccountBtn">🗑️ Apagar Conta</button>
                <div>
                    <button class="btn secondary" id="profileCancelBtn">Cancelar</button>
                    <button class="btn primary" id="profileSaveBtn">Salvar Alterações</button>
                </div>
            </div>
        `);
        
        document.getElementById('profileSaveBtn').addEventListener('click', saveProfile);
        document.getElementById('profileCancelBtn').addEventListener('click', UI.closeModal);
        document.getElementById('deleteAccountBtn').addEventListener('click', deleteAccount);
    };

    const saveProfile = async () => {
        const newName = document.getElementById('profileName').value.trim();
        const newFormat = document.getElementById('profileFormat').value;
        const newGenres = [...document.querySelectorAll('input[name="genre"]:checked')].map(el => el.value);
        
        if (!newName) {
            Notifications.show('O nome não pode ficar em branco', 'error');
            return;
        }

        const oldPrefs = {...session.prefs};
        
        session.name = newName;
        session.prefs = { format: newFormat, genres: newGenres };
        
        try {
            const payload = { name: session.name, email: session.email, prefs: session.prefs };
            const encryptedPayload = await Crypto.encrypt(JSON.stringify(payload), session.masterKey);
            const record = Storage.getUser(session.userId);
            record.payload = encryptedPayload;
            Storage.saveUser(session.userId, record);
            Storage.saveSession(session);
            
            Notifications.show('Perfil atualizado com sucesso!', 'success');
            UI.closeModal();
        } catch (error) {
            console.error('Erro ao salvar perfil:', error);
            Notifications.show('Erro ao salvar perfil. Tente novamente.', 'error');
        }
    };

    const deleteAccount = () => {
        if (confirm('⚠️ ATENÇÃO: Esta ação é irreversível!\n\nTodos os seus dados serão permanentemente excluídos:\n• Seu perfil e preferências\n• Histórico de conversas\n• Lembretes pessoais\n• Métricas de uso\n\nVocê tem certeza que deseja apagar sua conta?')) {
            Storage.deleteUser(session.userId);
            Notifications.show('Sua conta foi apagada permanentemente', 'info');
            handleLogout();
            UI.closeModal();
        }
    };

    const showReminders = () => {
        const userReminders = Storage.getUserReminders();
        const remindersHTML = userReminders.length > 0 ? 
            userReminders.map(reminder => `
                <div class="reminder-item">
                    <div>
                        <strong>${reminder.text}</strong>
                        <div style="font-size: 12px; color: var(--text-muted);">
                            ${new Date(reminder.dueDate).toLocaleString('pt-BR')}
                            ${reminder.completed ? '✅ Concluído' : reminder.notified ? '🔔 Notificado' : '⏰ Pendente'}
                        </div>
                    </div>
                    <div class="reminder-actions">
                        ${!reminder.completed ? `
                            <button class="btn success complete-reminder" data-id="${reminder.id}" style="padding: 4px 8px; font-size: 12px;">✅</button>
                        ` : ''}
                        <button class="btn danger delete-reminder" data-id="${reminder.id}" style="padding: 4px 8px; font-size: 12px;">🗑️</button>
                    </div>
                </div>
            `).join('') :
            '<p style="text-align: center; color: var(--text-muted);">Nenhum lembrete criado ainda.</p>';
        
        UI.openModal('⏰ Meus Lembretes', `
            <p>Gerencie seus lembretes aqui. Você também pode criar lembretes falando comigo!</p>
            
            <div id="reminders-list">
                ${remindersHTML}
            </div>
            
            <div class="card-actions">
                <button class="btn secondary" id="remindersCloseBtn">Fechar</button>
                <button class="btn primary" id="createReminderBtn">Criar Lembrete</button>
            </div>
        `);
        
        document.getElementById('remindersCloseBtn').addEventListener('click', UI.closeModal);
        document.getElementById('createReminderBtn').addEventListener('click', createNewReminder);
        
        // Event listeners para ações dos lembretes
        document.querySelectorAll('.complete-reminder').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = e.target.dataset.id;
                Storage.updateReminder(id, { completed: true });
                showReminders(); // Recarregar a lista
                Notifications.show('Lembrete marcado como concluído!', 'success');
            });
        });
        
        document.querySelectorAll('.delete-reminder').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = e.target.dataset.id;
                Storage.deleteReminder(id);
                showReminders(); // Recarregar a lista
                Notifications.show('Lembrete excluído!', 'info');
            });
        });
    };
    
    const createNewReminder = () => {
        const text = prompt('Digite o texto do lembrete:');
        if (!text) return;
        
        const dateStr = prompt('Digite a data e hora (ex: amanhã 20:00 ou 25/12/2024 15:30):');
        if (!dateStr) return;
        
        const dueDate = Reminders.parseReminderText(`${text} ${dateStr}`);
        Reminders.createReminder(text, dueDate);
        showReminders(); // Recarregar a lista
    };

    const showNews = () => {
        const news = NLP.getLatestNews();
        UI.openModal('📰 Últimas Notícias', `
            <div style="max-height: 400px; overflow-y: auto;">
                ${news.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')}
            </div>
            <div class="card-actions">
                <button class="btn secondary" id="newsCloseBtn">Fechar</button>
                <button class="btn primary" id="refreshNewsBtn">Atualizar Notícias</button>
            </div>
        `);
        
        document.getElementById('newsCloseBtn').addEventListener('click', UI.closeModal);
        document.getElementById('refreshNewsBtn').addEventListener('click', () => {
            UI.closeModal();
            setTimeout(showNews, 500); // Recarregar após um breve delay
        });
    };

    const initVoiceControls = () => {
        // Controle de entrada por voz
        DOM.voiceInputBtn.addEventListener('click', () => {
            if (DOM.voiceInputBtn.classList.contains('listening')) {
                Voice.stopListening();
                UI.setVoiceButtonState(DOM.voiceInputBtn, false);
            } else {
                const success = Voice.startListening(
                    (transcript) => {
                        UI.setVoiceButtonState(DOM.voiceInputBtn, false);
                        DOM.inputMessage.value = transcript;
                        Notifications.show('Mensagem capturada por voz!', 'success');
                    },
                    (error) => {
                        UI.setVoiceButtonState(DOM.voiceInputBtn, false);
                        Notifications.show(`Erro no reconhecimento de voz: ${error}`, 'error');
                    }
                );
                
                if (success) {
                    UI.setVoiceButtonState(DOM.voiceInputBtn, true);
                    Notifications.show('Ouvindo... fale agora!', 'info');
                }
            }
        });
        
        // Controle de saída por voz
        DOM.voiceOutputBtn.addEventListener('click', () => {
            const lastMessage = session.chatHistory
                .filter(msg => msg.from === 'yume')
                .pop();
            
            if (lastMessage) {
                UI.setVoiceButtonState(DOM.voiceOutputBtn, true);
                Voice.speak(lastMessage.text, () => {
                    UI.setVoiceButtonState(DOM.voiceOutputBtn, false);
                });
            } else {
                Notifications.show('Nenhuma mensagem recente para ler', 'warning');
            }
        });
    };

    return { 
        handleSendMessage, 
        handleAuth, 
        handleLogout, 
        showProfile, 
        showReminders,
        showNews,
        initVoiceControls
    };
})();

// =================================================================================
// --- Inicialização e Event Listeners ---
// =================================================================================
document.addEventListener('DOMContentLoaded', () => {
    // Restaurar sessão se existir
    const savedSession = Storage.getSession();
    if (savedSession.userId) {
        session = { ...session, ...savedSession };
        UI.renderApp();
    }

    // Event listeners principais
    DOM.authActionBtn.addEventListener('click', App.handleAuth);
    DOM.chatForm.addEventListener('submit', App.handleSendMessage);
    DOM.newChatBtn.addEventListener('click', UI.clearChat);
    DOM.profileBtn.addEventListener('click', App.showProfile);
    DOM.remindersBtn.addEventListener('click', App.showReminders);
    DOM.newsBtn.addEventListener('click', App.showNews);
    DOM.logoutBtn.addEventListener('click', App.handleLogout);
    
    // Inicializar controles de voz
    App.initVoiceControls();
    
    // Auto-resize do textarea
    DOM.inputMessage.addEventListener('input', e => { 
        e.target.style.height = 'auto'; 
        e.target.style.height = `${e.target.scrollHeight}px`; 
    });
    
    // Sugestões de chip
    document.querySelectorAll('.suggestion-chip').forEach(chip => {
        chip.addEventListener('click', () => {
            DOM.inputMessage.value = chip.dataset.prompt;
            DOM.chatForm.dispatchEvent(new Event('submit', { cancelable: true }));
        });
    });
    
    // Tecla Enter para enviar (Shift+Enter para nova linha)
    DOM.inputMessage.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            DOM.chatForm.dispatchEvent(new Event('submit', { cancelable: true }));
        }
    });
    
    // Foco no campo de entrada após carregamento
    if (session.userId) {
        setTimeout(() => DOM.inputMessage.focus(), 500);
    }
    
    // Inicializar serviços
    Voice.initSTT();
    Voice.initTTS();
    Notifications.requestPermission();
});
</script>
</body>
</html>
