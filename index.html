<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yume - Assistente</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #ec4899;
            --primary-dark: #be185d;
            --secondary: #8b5cf6;
            --accent: #3b82f6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #06b6d4;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --surface: rgba(255, 255, 255, 0.98);
            --text: #1f2937;
            --text-muted: #6b7280;
            --border: rgba(236, 72, 153, 0.2);
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
            --shadow-lg: 0 20px 50px rgba(236, 72, 153, 0.3);
            --glass: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.18);
        }


        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'SF Pro Display', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }


        .app-container {
            display: grid;
            grid-template-columns: 320px 1fr;
            height: 100vh;
            max-width: 2000px;
            margin: 0 auto;
            background: var(--surface);
            backdrop-filter: blur(40px);
            position: relative;
            box-shadow: var(--shadow-lg);
        }


        /* Enhanced Sidebar */
        .sidebar {
            background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(255,255,255,0.85));
            backdrop-filter: blur(40px);
            border-right: 1px solid var(--border);
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            box-shadow: var(--shadow);
            position: relative;
            z-index: 10;
        }


        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
            padding: 16px;
            background: var(--glass);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            position: relative;
            overflow: hidden;
        }


        .sidebar-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
        }


        .sidebar-avatar {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: var(--shadow-lg);
            animation: float 3s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }


        .sidebar-avatar::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.4), transparent);
            transform: translateX(-100%);
            animation: shine 3s ease-in-out infinite;
        }


        @keyframes shine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }


        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-10px) scale(1.05); }
        }


        .sidebar-title h1 {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }


        .sidebar-subtitle {
            font-size: 13px;
            color: var(--primary);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }


        .mode-selector {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 24px;
            padding: 12px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            backdrop-filter: blur(20px);
        }


        .mode-btn {
            padding: 14px 8px;
            border: 2px solid transparent;
            border-radius: 14px;
            background: transparent;
            color: var(--text);
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            position: relative;
            overflow: hidden;
        }


        .mode-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border-color: transparent;
            box-shadow: var(--shadow);
            transform: translateY(-2px);
        }


        .mode-btn:hover:not(.active) {
            background: rgba(236, 72, 153, 0.1);
            transform: translateY(-1px);
        }


        .sidebar-btn {
            width: 100%;
            padding: 18px 20px;
            margin-bottom: 8px;
            border: none;
            border-radius: 16px;
            background: transparent;
            color: var(--text);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            overflow: hidden;
        }


        .sidebar-btn:hover {
            background: rgba(236, 72, 153, 0.1);
            transform: translateX(8px);
            box-shadow: var(--shadow);
        }


        .sidebar-btn.primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-weight: 700;
            box-shadow: var(--shadow-lg);
        }


        .sidebar-btn.primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(236, 72, 153, 0.4);
        }


        .feature-badge {
            background: linear-gradient(135deg, #8b5cf6, #a855f7);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            margin-left: auto;
            animation: pulse 2s infinite;
        }


        /* Enhanced Chat Area */
        .chat-area {
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
            background: var(--surface);
        }


        .chat-header {
            background: var(--surface);
            backdrop-filter: blur(40px);
            padding: 20px 30px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.08);
        }


        .status-indicator {
            width: 12px;
            height: 12px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
            position: relative;
        }


        .status-indicator::after {
            content: '';
            position: absolute;
            inset: -3px;
            border: 2px solid var(--success);
            border-radius: 50%;
            animation: ripple 2s ease-out infinite;
        }


        @keyframes ripple {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(2.4); opacity: 0; }
        }


        .security-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, var(--success), #059669);
            color: white;
            padding: 8px 16px;
            border-radius: 24px;
            font-size: 13px;
            font-weight: 700;
            box-shadow: var(--shadow);
        }


        .chat-content {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            background: 
                radial-gradient(circle at 20% 80%, rgba(236, 72, 153, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
        }


        .empty-state {
            text-align: center;
            margin: auto;
            max-width: 800px;
            padding: 60px 40px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--shadow);
        }


        .empty-state h2 {
            font-size: 42px;
            margin-bottom: 16px;
            color: var(--text);
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }


        .suggestion-chips {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
            justify-content: center;
            margin-top: 32px;
        }


        .suggestion-chip {
            padding: 18px 24px;
            background: var(--surface);
            backdrop-filter: blur(20px);
            border: 2px solid var(--border);
            border-radius: 16px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            color: var(--text);
            text-align: center;
            position: relative;
            overflow: hidden;
        }


        .suggestion-chip:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            transform: translateY(-4px) scale(1.02);
            box-shadow: var(--shadow-lg);
        }


        .messages {
            display: flex;
            flex-direction: column;
            gap: 24px;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }


        .message {
            display: flex;
            gap: 16px;
            align-items: flex-start;
            animation: slideIn 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }


        @keyframes slideIn {
            from { 
                opacity: 0; 
                transform: translateY(20px) scale(0.95);
            }
            to { 
                opacity: 1; 
                transform: translateY(0) scale(1);
            }
        }


        .message.user {
            flex-direction: row-reverse;
        }


        .message-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }


        .message.yume .message-avatar {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
        }


        .message.user .message-avatar {
            background: linear-gradient(135deg, #60a5fa, #3b82f6);
        }


        .message-content {
            max-width: 80%;
            padding: 20px 24px;
            border-radius: 20px;
            font-size: 16px;
            line-height: 1.6;
            position: relative;
            box-shadow: var(--shadow);
        }


        .message.yume .message-content {
            background: var(--surface);
            backdrop-filter: blur(20px);
            color: var(--text);
            border-bottom-left-radius: 8px;
            border: 1px solid var(--border);
        }


        .message.user .message-content {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border-bottom-right-radius: 8px;
        }


        .message-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }


        .message-action-btn {
            padding: 8px 16px;
            border: 1px solid var(--border);
            background: white;
            border-radius: 10px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }


        .message-action-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            transform: translateY(-1px);
        }


        .chat-input-area {
            padding: 24px 30px;
            background: var(--surface);
            backdrop-filter: blur(40px);
            border-top: 1px solid var(--border);
            box-shadow: 0 -5px 30px rgba(0, 0, 0, 0.08);
        }


        .chat-input-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            background: white;
            border: 2px solid var(--border);
            border-radius: 20px;
            padding: 16px 100px 16px 24px;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: var(--shadow);
        }


        .chat-input-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(236, 72, 153, 0.15), var(--shadow-lg);
            transform: translateY(-2px);
        }


        .chat-input {
            width: 100%;
            border: none;
            outline: none;
            font-size: 16px;
            resize: none;
            max-height: 150px;
            font-family: inherit;
            line-height: 1.5;
            background: transparent;
        }


        .input-actions {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            gap: 8px;
        }


        .input-action-btn {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            background: var(--glass);
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }


        .input-action-btn:hover {
            background: var(--primary);
            color: white;
            transform: scale(1.1);
        }


        .send-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: var(--shadow);
        }


        .send-btn:hover:not(:disabled) {
            transform: scale(1.1) rotate(5deg);
            box-shadow: var(--shadow-lg);
        }


        .quick-actions {
            display: flex;
            gap: 12px;
            max-width: 1200px;
            margin: 20px auto 0;
            flex-wrap: wrap;
            justify-content: center;
        }


        .quick-action-btn {
            padding: 12px 20px;
            border: 2px solid var(--border);
            background: white;
            border-radius: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            color: var(--text);
            box-shadow: var(--shadow);
        }


        .quick-action-btn:hover {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
            transform: translateY(-2px);
        }


        /* Enhanced Components */
        .learning-step {
            background: rgba(16, 185, 129, 0.1);
            border-left: 4px solid var(--success);
            padding: 20px;
            border-radius: 12px;
            margin: 16px 0;
            backdrop-filter: blur(10px);
        }


        .otaku-recommendation {
            background: rgba(236, 72, 153, 0.1);
            border-left: 4px solid var(--primary);
            padding: 20px;
            border-radius: 12px;
            margin: 16px 0;
            backdrop-filter: blur(10px);
        }


        .code-block {
            background: rgba(30, 30, 40, 0.9);
            color: #f8fafc;
            padding: 20px;
            border-radius: 12px;
            margin: 16px 0;
            font-family: 'Courier New', monospace;
            border: 1px solid rgba(255,255,255,0.1);
        }


        .tool-result {
            background: rgba(59, 130, 246, 0.1);
            border-left: 4px solid var(--accent);
            padding: 20px;
            border-radius: 12px;
            margin-top: 16px;
            font-size: 15px;
            backdrop-filter: blur(10px);
        }


        /* Overlay & Modal Styles */
        .overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: overlayAppear 0.3s ease-out;
        }


        .card {
            background: var(--surface);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
            max-width: 600px;
            width: 100%;
            animation: modalSlide 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            border: 1px solid var(--border);
            backdrop-filter: blur(40px);
        }


        .form-group {
            margin-bottom: 20px;
        }


        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text);
        }


        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            font-family: inherit;
        }


        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(236, 72, 153, 0.1);
        }


        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }


        .btn.primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }


        .btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }


        .btn.secondary {
            background: #f3f4f6;
            color: var(--text);
        }


        .btn.secondary:hover {
            background: #e5e7eb;
        }


        .card-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            justify-content: flex-end;
        }


        .terms-checkbox {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin: 20px 0;
            padding: 16px;
            background: rgba(236, 72, 153, 0.05);
            border-radius: 12px;
            border: 2px solid var(--border);
        }


        .terms-checkbox input[type="checkbox"] {
            margin-top: 2px;
            flex-shrink: 0;
        }


        .terms-checkbox label {
            font-size: 14px;
            line-height: 1.5;
            cursor: pointer;
        }


        .terms-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }


        .terms-link:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }


        .notification-container {
            position: fixed;
            top: 30px;
            right: 30px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }


        .notification {
            background: white;
            padding: 20px 24px;
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 16px;
            max-width: 450px;
            animation: slideInRight 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            border-left: 6px solid;
            position: relative;
            overflow: hidden;
        }


        .notification.success { border-left-color: var(--success); }
        .notification.error { border-left-color: var(--danger); }
        .notification.warning { border-left-color: var(--warning); }
        .notification.info { border-left-color: var(--accent); }


        /* Responsive Design */
        @media (max-width: 1200px) {
            .app-container {
                grid-template-columns: 280px 1fr;
            }
        }


        @media (max-width: 968px) {
            .app-container {
                grid-template-columns: 1fr;
            }
            
            .sidebar {
                display: none;
            }
        }


        @media (max-width: 640px) {
            .chat-content {
                padding: 20px;
            }
            
            .chat-input-area {
                padding: 20px;
            }
            
            .suggestion-chips {
                grid-template-columns: 1fr;
            }


            .quick-actions {
                flex-direction: column;
            }


            .message-content {
                max-width: 90%;
            }
        }


        .hidden { display: none !important; }


        /* Advanced Features Styles */
        .command-palette {
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            box-shadow: var(--shadow-lg);
            z-index: 1001;
            min-width: 400px;
            max-width: 90vw;
        }


        .command-item {
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s ease;
        }


        .command-item:hover {
            background: rgba(236, 72, 153, 0.1);
        }


        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(236, 72, 153, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin: 10px 0;
        }


        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 3px;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Enhanced Sidebar -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-avatar">🤖</div>
                <div class="sidebar-title">
                    <h1>Yume</h1>
                    <p class="sidebar-subtitle">Powered by ORPHEO Platforms</p>
                </div>
            </div>


            <div class="mode-selector">
                <button class="mode-btn active" data-mode="otaku">
                    <i class="fas fa-gamepad"></i>
                    <span>Otaku</span>
                </button>
                <button class="mode-btn" data-mode="productivity">
                    <i class="fas fa-tasks"></i>
                    <span>Produtivo</span>
                </button>
                <button class="mode-btn" data-mode="learning">
                    <i class="fas fa-graduation-cap"></i>
                    <span>Aprender</span>
                </button>
            </div>


            <button class="sidebar-btn primary" id="newChatBtn">
                <i class="fas fa-plus"></i>
                Nova Conversa
                <span class="feature-badge">NEW</span>
            </button>


            <div class="sidebar-divider"></div>


            <!-- Otaku Mode Features -->
            <div id="otakuMenu">
                <button class="sidebar-btn" data-command="/anime recommend">
                    <i class="fas fa-star"></i>
                    Recomendações Anime
                </button>
                <button class="sidebar-btn" data-command="/manga trending">
                    <i class="fas fa-chart-line"></i>
                    Mangás em Alta
                </button>

                    } else if (command === '/help') {

                        response = this.showAllCommands();

                        response = this.handleModeSwitch(command);

                       this.generateSampleCode(language, functionality) +
                       `\n\`\`\`\n\n` +
                       `📝 *Explicação:* Este código demonstra os conceitos básicos de ${functionality} em ${language}.`;
            }


            generateSampleCode(language, functionality) {
                const samples = {
                    python: `def ${functionality.replace(' ', '_')}():\n    print("Hello, World!")\n\n# Exemplo de uso\nif __name__ == "__main__":\n    ${functionality.replace(' ', '_')}()`,
                    javascript: `function ${functionality.replace(' ', '')}() {\n    console.log("Hello, World!");\n}\n\n// Exemplo de uso\n${functionality.replace(' ', '')}();`,
                    html: `<!DOCTYPE html>\n<html>\n<head>\n    <title>${functionality}</title>\n</head>\n<body>\n    <h1>Hello, World!</h1>\n</body>\n</html>`
                };
                
                return samples[language] || samples.python;
            }


            showHelp() {
                return `🆘 **Sistema de Ajuda do Yume AI**\n\n` +
                       `**Comandos Disponíveis:**\n\n` +
                       `🎌 **Modo Otaku**\n` +
                       `• \`/anime recommend\` - Recomendações de anime\n` +
                       `• \`/manga trending\` - Mangás populares\n` +
                       `• \`/character analyze\` - Análise de personagens\n\n` +
                       `📊 **Modo Produtividade**\n` +
                       `• \`/task create\` - Criar sistema de tarefas\n` +
                       `• \`/schedule optimize\` - Otimizar agenda\n` +
                       `• \`/pomodoro start\` - Técnica Pomodoro\n\n` +
                       `🎓 **Modo Aprendizado**\n` +
                       `• \`/learn programming\` - Aprender programação\n` +
                       `• \`/tech basics\` - Conceitos de tecnologia\n` +
                       `• \`/math help\` - Ajuda com matemática\n\n` +
                       `⚡ **Comandos Gerais**\n` +
                       `• \`/help\` - Mostrar esta ajuda\n` +
                       `• \`/commands\` - Listar todos os comandos\n` +
                       `• \`/mode\` - Trocar modo\n` +
                       `• \`/clear\` - Limpar chat\n\n` +
                       `💡 *Dica:* Use \`Ctrl+K\` para abrir a paleta de comandos rapidamente!`;
            }


            showAllCommands() {
                let commandsText = `⌨️ **Todos os Comandos Disponíveis**\n\n`;
                
                Object.entries(this.commands).forEach(([command, info]) => {
                    commandsText += `**${command}**\n`;
                    commandsText += `• *Descrição:* ${info.description}\n`;
                    commandsText += `• *Uso:* ${info.usage}\n`;
                    if (info.examples.length > 0) {
                        commandsText += `• *Exemplos:* ${info.examples.join(', ')}\n`;
                    }
                    commandsText += '\n';
                });


                return commandsText;
            }


            handleModeSwitch(command) {
                const mode = command.replace('/mode', '').trim();
                if (['otaku', 'productivity', 'learning'].includes(mode)) {
                    this.switchMode(mode);
                    return `🔄 **Modo alterado para:** ${mode}\n\n` +
                           `Agora você tem acesso a todas as funcionalidades do modo ${mode}!`;
                } else {
                    return `❌ Modo inválido. Use: \`/mode otaku\`, \`/mode productivity\` ou \`/mode learning\``;
                }
            }


            // UI Methods
            addMessage(type, content, options = {}) {
                const messagesContainer = document.getElementById('messages');
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${type}`;


                const avatar = document.createElement('div');
                avatar.className = 'message-avatar';
                avatar.innerHTML = type === 'user' ? '<i class="fas fa-user"></i>' : '<i class="fas fa-robot"></i>';


                const messageContent = document.createElement('div');
                messageContent.className = 'message-content';
                messageContent.innerHTML = this.formatMessage(content);


                if (type === 'yume' && options.showActions) {
                    const actionsDiv = document.createElement('div');
                    actionsDiv.className = 'message-actions';
                    actionsDiv.innerHTML = `
                        <button class="message-action-btn" onclick="yumeAI.copyMessage('${this.escapeHtml(content)}')">
                            <i class="fas fa-copy"></i> Copiar
                        </button>
                        <button class="message-action-btn" onclick="yumeAI.speakMessage('${this.escapeHtml(content)}')">
                            <i class="fas fa-volume-up"></i> Ouvir
                        </button>
                        <button class="message-action-btn" onclick="yumeAI.shareMessage('${this.escapeHtml(content)}')">
                            <i class="fas fa-share"></i> Compartilhar
                        </button>
                    `;
                    messageContent.appendChild(actionsDiv);
                }


                const time = document.createElement('div');
                time.className = 'message-time';
                time.textContent = new Date().toLocaleTimeString('pt-BR', { 
                    hour: '2-digit', 
                    minute: '2-digit' 
                });


                messageContent.appendChild(time);
                messageDiv.appendChild(avatar);
                messageDiv.appendChild(messageContent);
                messagesContainer.appendChild(messageDiv);


                this.scrollToBottom();
                document.getElementById('emptyState').classList.add('hidden');
            }


            formatMessage(content) {
                // Convert markdown-like syntax to HTML
                return content
                    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                    .replace(/\*(.*?)\*/g, '<em>$1</em>')
                    .replace(/`(.*?)`/g, '<code>$1</code>')
                    .replace(/\n/g, '<br>')
                    .replace(/•/g, '•')
                    .replace(/🎌/g, '🎌')
                    .replace(/📚/g, '📚')
                    .replace(/💻/g, '💻')
                    .replace(/✅/g, '✅');
            }


            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }


            showTypingIndicator() {
                const messagesContainer = document.getElementById('messages');
                const typingDiv = document.createElement('div');
                typingDiv.className = 'message yume';
                typingDiv.id = 'typing-indicator';


                typingDiv.innerHTML = `
                    <div class="message-avatar"><i class="fas fa-robot"></i></div>
                    <div class="message-content">
                        <div class="ai-thinking">
                            <i class="fas fa-brain"></i>
                            Yume está digitando...
                            <div class="typing-indicator">
                                <div class="typing-dot"></div>
                                <div class="typing-dot"></div>
                                <div class="typing-dot"></div>
                            </div>
                        </div>
                    </div>
                `;


                messagesContainer.appendChild(typingDiv);
                this.scrollToBottom();
            }


            hideTypingIndicator() {
                const typingIndicator = document.getElementById('typing-indicator');
                if (typingIndicator) {
                    typingIndicator.remove();
                }
            }


            scrollToBottom() {
                const chatContent = document.getElementById('chatContent');
                chatContent.scrollTop = chatContent.scrollHeight;
            }


            clearChat() {
                document.getElementById('messages').innerHTML = '';
                document.getElementById('emptyState').classList.remove('hidden');
                this.currentChat = [];
            }


            // Command Palette
            showCommandPalette() {
                const palette = document.getElementById('commandPalette');
                const search = document.getElementById('commandSearch');
                const list = document.getElementById('commandList');


                // Populate command list
                list.innerHTML = '';
                Object.entries(this.commands).forEach(([command, info]) => {
                    const item = document.createElement('div');
                    item.className = 'command-item';
                    item.innerHTML = `
                        <div><strong>${command}</strong></div>
                        <div style="font-size: 12px; color: var(--text-muted);">${info.description}</div>
                    `;
                    item.addEventListener('click', () => {
                        this.executeCommand(command);
                        this.hideCommandPalette();
                    });
                    list.appendChild(item);
                });


                palette.classList.remove('hidden');
                search.focus();


                // Handle search
                search.addEventListener('input', (e) => {
                    const searchTerm = e.target.value.toLowerCase();
                    const items = list.getElementsByClassName('command-item');
                    
                    Array.from(items).forEach(item => {
                        const text = item.textContent.toLowerCase();
                        item.style.display = text.includes(searchTerm) ? 'block' : 'none';
                    });
                });


                // Handle escape
                search.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') {
                        this.hideCommandPalette();
                    }
                });
            }


            hideCommandPalette() {
                document.getElementById('commandPalette').classList.add('hidden');
            }


            // Voice Input
            startVoiceInput() {
                if (!('webkitSpeechRecognition' in window)) {
                    this.showNotification('Reconhecimento de voz não suportado', 'error');
                    return;
                }


                const recognition = new webkitSpeechRecognition();
                recognition.lang = 'pt-BR';
                recognition.start();


                recognition.onresult = (event) => {
                    const transcript = event.results[0][0].transcript;
                    document.getElementById('chatInput').value = transcript;
                    this.showNotification('Voz capturada com sucesso!', 'success');
                };


                recognition.onerror = (event) => {
                    this.showNotification('Erro no reconhecimento de voz', 'error');
                };
            }


            // Utility Methods
            copyMessage(text) {
                navigator.clipboard.writeText(text).then(() => {
                    this.showNotification('✓ Mensagem copiada!', 'success');
                });
            }


            speakMessage(text) {
                if ('speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'pt-BR';
                    speechSynthesis.speak(utterance);
                    this.showNotification('🔊 Reproduzindo áudio...', 'info');
                } else {
                    this.showNotification('Síntese de voz não suportada', 'error');
                }
            }


            shareMessage(text) {
                if (navigator.share) {
                    navigator.share({
                        title: 'Yume - Mensagem',
                        text: text
                    });
                } else {
                    this.copyMessage(text);
                    this.showNotification('✓ Mensagem copiada para compartilhar!', 'success');
                }
            }


            showNotification(message, type = 'info') {
                const container = document.getElementById('notificationContainer');
                const notification = document.createElement('div');
                notification.className = `notification ${type}`;
                notification.innerHTML = `
                    <i class="fas fa-${this.getNotificationIcon(type)}"></i>
                    <span>${message}</span>
                    <button onclick="this.parentElement.remove()" style="margin-left: auto; background: none; border: none; cursor: pointer;">
                        <i class="fas fa-times"></i>
                    </button>
                `;
                
                container.appendChild(notification);
                setTimeout(() => notification.remove(), 5000);
            }


            getNotificationIcon(type) {
                const icons = {
                    success: 'check-circle',
                    error: 'exclamation-circle',
                    warning: 'exclamation-triangle',
                    info: 'info-circle'
                };
                return icons[type] || 'info-circle';
            }


            switchMode(mode) {
                this.currentMode = mode;
                document.getElementById('currentMode').textContent = `Modo: ${this.capitalizeFirstLetter(mode)}`;
                
                // Update active mode button
                document.querySelectorAll('.mode-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.mode === mode);
                });


                // Show/hide mode-specific menus
                document.getElementById('otakuMenu').classList.toggle('hidden', mode !== 'otaku');
                document.getElementById('productivityMenu').classList.toggle('hidden', mode !== 'productivity');
                document.getElementById('learningMenu').classList.toggle('hidden', mode !== 'learning');


                this.showNotification(`Modo alterado para: ${this.capitalizeFirstLetter(mode)}`, 'info');
            }


            capitalizeFirstLetter(string) {
                return string.charAt(0).toUpperCase() + string.slice(1);
            }


            adjustTextareaHeight() {
                const textarea = document.getElementById('chatInput');
                textarea.style.height = 'auto';
                textarea.style.height = Math.min(textarea.scrollHeight, 150) + 'px';
            }


            handleInputKeydown(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    document.getElementById('chatForm').dispatchEvent(new Event('submit'));
                }
            }


            handleInputChange(e) {
                this.adjustTextareaHeight();
            }


            showWelcomeMessage() {
                if (this.currentChat.length === 0) {
                    this.addMessage('yume', 
                        `👋 **Bem-vindo ao Yume!**\n\n` +
                        `Eu sou sua assistente pessoal com múltiplas funcionalidades. Aqui estão algumas coisas que posso fazer:\n\n` +
                        `🎌 **Modo Otaku:** Recomendações de anime, análise de personagens, notícias do mundo otaku\n` +
                        `📊 **Modo Produtividade:** Gerenciamento de tarefas, técnicas Pomodoro, otimização de agenda\n` +
                        `🎓 **Modo Aprendizado:** Tutoriais de programação, ajuda em matemática, conceitos de tecnologia\n\n` +
                        `💡 **Dica:** Use comandos começando com \`/\` ou explore os botões na sidebar!\n\n` +
                        `Experimente: \`/help\` para ver todos os comandos disponíveis.`
                    );
                }
            }


            // Auth Methods (simplified for demo)
            loadUser() {
                const savedUser = localStorage.getItem('yume_user');
                if (savedUser) {
                    this.currentUser = JSON.parse(savedUser);
                    document.getElementById('authOverlay').classList.add('hidden');
                }
            }


            toggleAuthMode() {
                const toggleBtn = document.getElementById('authToggleBtn');
                const actionBtn = document.getElementById('authActionBtn');
                
                if (actionBtn.textContent.includes('Cadastrar')) {
                    toggleBtn.innerHTML = '<i class="fas fa-user-plus"></i> Quero me cadastrar';
                    actionBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar';
                } else {
                    toggleBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Já tenho conta';
                    actionBtn.innerHTML = '<i class="fas fa-user-plus"></i> Cadastrar';
                }
            }


            handleAuth() {
                const name = document.getElementById('inputName').value;
                const email = document.getElementById('inputEmail').value;
                
                if (!document.getElementById('termsCheckbox').checked) {
                    this.showNotification('Você precisa aceitar os termos de uso', 'error');
                    return;
                }


                this.currentUser = {
                    id: Date.now(),
                    name: name || 'Usuário',
                    email: email || 'user@example.com'
                };


                localStorage.setItem('yume_user', JSON.stringify(this.currentUser));
                document.getElementById('authOverlay').classList.add('hidden');
                this.showNotification('Bem-vindo a Yume! 🚀', 'success');
                this.updateUI();
            }


            logout() {
                this.currentUser = null;
                localStorage.removeItem('yume_user');
                document.getElementById('authOverlay').classList.remove('hidden');
                this.clearChat();
                this.showNotification('Logout realizado com sucesso!', 'info');
            }


            updateUI() {
                if (this.currentUser) {
                    document.title = `Yume AI - ${this.currentUser.name}`;
                }
            }
        }


        // Initialize the application
        const yumeAI = new YumeAI();


        // Global exports for HTML onclick handlers
        window.yumeAI = yumeAI;


        // Auto-login for demo purposes - REMOVE IN PRODUCTION
        setTimeout(() => {
            if (!localStorage.getItem('yume_user')) {
                // Auto create demo user
                yumeAI.currentUser = {
                    id: Date.now(),
                    name: 'Usuário Demo',
                    email: 'demo@yume.ai'
                };
                localStorage.setItem('yume_user', JSON.stringify(yumeAI.currentUser));
                document.getElementById('authOverlay').classList.add('hidden');
                yumeAI.showNotification('Modo demo ativado! 🚀', 'success');
                yumeAI.updateUI();
            }
        }, 1000);
    </script>
